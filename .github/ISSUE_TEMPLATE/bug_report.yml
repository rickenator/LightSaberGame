name: Bug report
description: Report an Arcblade bug
labels: [bug]
body:
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: Pixel 7
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: Android 14
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
