name: Feature request
description: Propose an Arcblade feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: milestone
    attributes:
      label: Target milestone
      placeholder: M1 / M2 / M3
